services:
  nginx:
    image: nginx:alpine
    container_name: notes-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend

  frontend:
    build: ./frontend
    container_name: notes-frontend
    expose:
      - "5173"
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: notes-backend
    expose:
      - "5000"
    environment:
      DB_HOST: db
      DB_NAME: notesdb
      DB_USER: admin
      DB_PASSWORD: password
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: notes-db
    environment:
      POSTGRES_DB: notesdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
